name: Deploy to VPS

# Se déclenche à chaque push sur main + manuellement depuis l'onglet Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Une seule exécution à la fois (évite les déploiements concurrents).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on VPS Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Étape 1 : valider que les secrets requis sont définis avec un message clair
      - name: Check required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=()
          [ -z "$VPS_HOST"    ] && missing+=("VPS_HOST")
          [ -z "$VPS_USER"    ] && missing+=("VPS_USER")
          [ -z "$VPS_SSH_KEY" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✓ All required secrets present"

      - name: Setup SSH client
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key
          # Trust the host fingerprint
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/spi' }}
        run: |
          ssh -i ~/.ssh/ci_key -p "$VPS_PORT" -o StrictHostKeyChecking=accept-new \
              "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "${DEPLOY_PATH:-/opt/spi}"

            echo "▶ Pulling latest main..."
            git fetch origin main
            git reset --hard origin/main

            echo "▶ Building + restarting stack..."
            docker compose up -d --build

            echo "▶ Pruning dangling images..."
            docker image prune -f

            echo "▶ Waiting for health (max 90s)..."
            for i in {1..18}; do
              statuses=$(docker compose ps --format '{{.Service}} {{.Health}}' | grep -E '^(backend|db|web)' | awk '{print $2}')
              if echo "$statuses" | grep -qE 'starting|unhealthy|^$'; then
                echo "  …still starting (${i}/18)"
                sleep 5
              else
                echo "  ✓ All services healthy"
                break
              fi
            done

            echo "▶ Final status:"
            docker compose ps

            echo "▶ Health endpoint:"
            curl -fsS http://127.0.0.1/api/health || (echo "❌ Health check failed"; exit 1)

            echo "✓ Deployment complete"
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ci_key
