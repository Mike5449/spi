# ----------------------------------------------------------------
# nginx du conteneur web — sert le SPA Vite et proxy /api/* → backend
# ----------------------------------------------------------------

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 12M;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/xml+rss text/javascript image/svg+xml
        application/font-woff application/font-woff2;

    # ---- API : proxy vers le backend FastAPI ----
    # /api/users/me  →  backend:8000/users/me  (le préfixe /api/ est strippé)
    location /api/ {
        proxy_pass         http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;  # MonCash sandbox peut être lent
        proxy_send_timeout 120s;
    }

    # ---- Statique Vite : cache long avec hash-busted filenames ----
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ---- HTML : pas de cache (pour les déploiements suivants) ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- SPA fallback : toute route inconnue → /index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
